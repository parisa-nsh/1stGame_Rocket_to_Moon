<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share – Rocket to the Moon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a0a2e;
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #ffd93d; }
    p { margin-bottom: 20px; opacity: 0.9; font-size: 0.95rem; }
    .qr-wrap {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .qr-wrap img { display: block; }
    .link {
      font-size: 0.9rem;
      word-break: break-all;
      color: #6bcbff;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Rocket to the Moon</h1>
  <p>Scan to play or share the game</p>
  <div class="qr-wrap">
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=https%3A%2F%2Fgame.theadvancheers.com%2F"
      width="280"
      height="280"
      alt="QR code for Rocket to the Moon"
    />
  </div>
  <span class="link">https://game.theadvancheers.com/</span>
</body>
</html>
